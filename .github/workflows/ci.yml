name: CI

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, develop, dev]

env:
  PYTHON_VERSION: "3.11"
  DATABASE_URL: "postgresql+asyncpg://test_user:test_pass@localhost:5432/embedding_test_db"
  REDIS_HOST: localhost
  REDIS_PORT: "6379"
  QDRANT_HOST: localhost
  QDRANT_PORT: "6333"
  ENVIRONMENT: development

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Check code quality
        run: ruff check src/ tests/

      - name: Check formatting
        run: ruff format --check src/ tests/

  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: embedding_test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d embedding_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:6333/readyz && break
            echo "Waiting for Qdrant..."
            sleep 2
          done

      - name: Run tests
        run: >
          pytest tests/test_db.py -v --tb=short
          --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  migrations:
    name: Migrations
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: embedding_test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d embedding_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Upgrade to head
        run: alembic upgrade head

      - name: Downgrade to base
        run: alembic downgrade base

      - name: Re-upgrade to head
        run: alembic upgrade head

      - name: Check single migration head
        run: |
          HEAD_COUNT=$(alembic heads | wc -l)
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "ERROR: Multiple migration heads detected!"
            alembic heads
            exit 1
          fi
          echo "Single migration head verified"

  docker-build:
    name: Docker Build
    needs: [test, migrations]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t lucam/image-embeeding-api:ci-${{ github.sha }} .

      - name: Verify image
        run: docker images lucam/image-embeeding-api:ci-${{ github.sha }}
