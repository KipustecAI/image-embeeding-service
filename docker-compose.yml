services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: embedding-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: embedding_service
      POSTGRES_USER: embed_user
      POSTGRES_PASSWORD: embed_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U embed_user -d embedding_service"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - embedding-network

  # Redis (ARQ + Streams)
  redis:
    image: redis:7-alpine
    container_name: embedding-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - embedding-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC port
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - embedding-network

  # # Image Embedding API Service
  # embedding-api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: embedding-api
  #   ports:
  #     - "8001:8001"
  #   env_file:
  #     - .env
  #   depends_on:
  #     - qdrant
  #   networks:
  #     - embedding-network
  #   command: python -m src.main

  # # Image Embedding Worker (Scheduler)
  # embedding-worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: embedding-worker
  #   env_file:
  #     - .env
  #   environment:
  #     - APP_NAME=Image Embedding Worker
  #   depends_on:
  #     - qdrant
  #     - embedding-api
  #   networks:
  #     - embedding-network
  #   command: python worker.py

networks:
  embedding-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data: